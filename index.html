<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Verification</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f8f8f8;
}

.navbar-wrapper{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    z-index:1000;
    background:#fff;
    border-bottom:1px solid #ddd;
}

.navbar{
    background:#fff;
    height:70px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 25px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

.logo span:first-child{
    color:#ff4500;
}

.logo span:last-child{
    color:#111;
}

.menu{
    width:60px;
    height:60px;
    border:1px solid #ddd;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    gap:6px;
    cursor:pointer;
    background:#fff;
}

.menu div{
    width:28px;
    height:3px;
    background:#555;
}

.menu-panel{
    display:none;
    width:100%;
    background:#fff;
    padding:12px 25px;
    border-top:1px solid #ddd;
    box-shadow:0 8px 20px rgba(0,0,0,0.06);
}

.menu-panel.active{
    display:block;
}

.login-link{
    display:block;
    color:#111;
    text-decoration:none;
    font-weight:600;
    padding:10px 0;
}

.login-link:hover{
    color:#ff4500;
}

.container{
    max-width:700px;
    margin:120px auto 70px;
    background:#fff;
    text-align:center;
    padding:40px 30px;
}

h1{
    font-size:60px;
    line-height:1.1;
    color:#111;
    margin-bottom:40px;
}

.info{
    font-size:22px;
    margin:25px 0;
}

.info b{
    color:#444;
}

.valid{
    margin-top:40px;
    font-size:28px;
}

.valid span{
    color:green;
    font-weight:bold;
}

.footer{
    margin-top:120px;
    color:#888;
    font-size:22px;
}

@media(max-width:768px){

h1{
    font-size:42px;
}

.info{
    font-size:18px;
}

.valid{
    font-size:22px;
}

.footer{
    font-size:18px;
}

}
</style>

</head>

<body>

<div class="navbar-wrapper">
    <div class="navbar">
        <div class="logo">
            <span>
                <img src="logo.jpeg" width="150" height="50" alt="SkillDzire Logo" class="logo-img">
            </span>
        </div>

        <button class="menu" id="menuBtn" type="button" aria-expanded="false" aria-controls="menuPanel">
            <div></div>
            <div></div>
            <div></div>
        </button>
    </div>

    <div class="menu-panel" id="menuPanel">
        <a href="https://lms.skilldzire.com/login#login" class="login-link" target="_blank" rel="noopener noreferrer">Login</a>
    </div>
</div>

<div class="container">

<h1>Certificate<br>Verification</h1>

<p class="info"><b>Certificate ID:</b> 76uvnmtk1c</p>

<p class="info"><b>Student Name:</b> Koyi Siva Akash</p>

<p class="info"><b>Course Name:</b> Machine Learning</p>

<p class="info"><b>Issue Date:</b> 25-06-2026</p>

<p class="valid">✅ This certificate is <span>valid.</span></p>

<div class="footer">
SkillDzire Technologies Private Limited
</div>

</div>

<script>
const menuBtn = document.getElementById('menuBtn');
const menuPanel = document.getElementById('menuPanel');

menuBtn.addEventListener('click', () => {
    const isOpen = menuPanel.classList.toggle('active');
    menuBtn.setAttribute('aria-expanded', isOpen);
});
</script>

</body>
</html>
